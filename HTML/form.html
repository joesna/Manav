<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        form{
            background-color: beige;
            font-size: xx-large;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            text-align: justify;
            margin-left: auto; 
            margin-right: auto;
        }
    </style>
</head>
<body>
    <form action="" method="post">
        <input type="text" name="Username" placeholder="Enter your Name"><br>
        <input type="email" name="Email" placeholder="Enter your Email"><br>
        <input type="button" name="submit" placeholder="submit"><br>
        <input type="checkbox" placeholder="wrong"><br>
        <input type="datetime"><br>
        <input type="file" name="chosen file"><br>
        <input type="month" name="Enter your birthday month" placeholder="Enter your birthday month"><br>
        <input type="number" name="Enter your Mobile" placeholder="Enter your mobile number"><br>
        <input type="password" name="Enter your password" placeholder="Enter your password"><br>
        <input type="range"><br>
        <input type="color"><br>
        <input type="search" placeholder="search"><br>
    </form>
</body>
</html>
